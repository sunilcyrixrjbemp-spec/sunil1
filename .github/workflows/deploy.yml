name: Deploy Application (Backend & Frontend)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '22'

      - name: Install Wrangler
        run: npm install -g wrangler

      - name: Install dependencies
        working-directory: ./worker-backend
        run: npm install

      - name: Deploy Worker
        working-directory: ./worker-backend
        run: |
          if [[ "${{ secrets.CF_API_TOKEN }}" == cfk_* ]]; then
            echo "Using Cloudflare Global API Key authentication..."
            export CLOUDFLARE_API_KEY="${{ secrets.CF_API_TOKEN }}"
            export CLOUDFLARE_EMAIL="Sunil.cyrixrjbemp@gmail.com"
          else
            echo "Using Cloudflare Scoped API Token authentication..."
            export CLOUDFLARE_API_TOKEN="${{ secrets.CF_API_TOKEN }}"
          fi
          npx wrangler deploy
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}

      - name: Set Worker Secrets
        working-directory: ./worker-backend
        run: |
          if [[ "${{ secrets.CF_API_TOKEN }}" == cfk_* ]]; then
            export CLOUDFLARE_API_KEY="${{ secrets.CF_API_TOKEN }}"
            export CLOUDFLARE_EMAIL="Sunil.cyrixrjbemp@gmail.com"
          else
            export CLOUDFLARE_API_TOKEN="${{ secrets.CF_API_TOKEN }}"
          fi
          echo "${{ secrets.CF_API_TOKEN }}" | npx wrangler secret put PRIMARY_CLOUDFLARE_API_TOKEN || true
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}

  deploy-frontend:
    needs: deploy-backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: 'frontend/package-lock.json'

      - name: Install dependencies
        working-directory: ./frontend
        run: npm install --legacy-peer-deps

      - name: Build
        working-directory: ./frontend
        env:
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
        run: |
          npm run build
          if [ -n "${{ secrets.VITE_API_BASE_URL }}" ]; then
            CLEAN_URL=$(echo "${{ secrets.VITE_API_BASE_URL }}" | sed 's/\/$//' | sed 's/\/api$//')
            echo "/api/* $CLEAN_URL/api/:splat 200" > dist/_redirects
          fi

      - name: Deploy to Cloudflare Pages
        working-directory: ./frontend
        run: |
          if [[ "${{ secrets.CF_API_TOKEN }}" == cfk_* ]]; then
            export CLOUDFLARE_API_KEY="${{ secrets.CF_API_TOKEN }}"
            export CLOUDFLARE_EMAIL="Sunil.cyrixrjbemp@gmail.com"
          else
            export CLOUDFLARE_API_TOKEN="${{ secrets.CF_API_TOKEN }}"
          fi
          npx wrangler pages deploy dist --project-name=sunil1
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
