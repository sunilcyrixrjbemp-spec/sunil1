name = "sunil1"
main = "app/main.py"
compatibility_date = "2024-03-18"
compatibility_flags = ["python_workers"]

[vars]
# Environment variables (overridden by wrangler secrets in production)
DATABASE_URL = "sqlite:///./test.db"
CLOUDFLARE_API_TOKEN = ""
CLOUDFLARE_ACCOUNT_ID = ""
CLOUDFLARE_DATABASE_ID = ""
CLOUDFLARE_R2_BUCKET_NAME = "fieldops-uploads"

[[d1_databases]]
binding = "DB"
database_name = "fieldops_db"
database_id = "34e085d8-c078-4f2f-b240-9bf8f4cf9301"

[[r2_buckets]]
binding = "UPLOADS_BUCKET"
bucket_name = "fieldops-uploads"
