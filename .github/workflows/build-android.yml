name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:  # Manual trigger button on GitHub

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout code
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      # 3. Setup Java (required for Android build)
      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      # 4. Setup Android SDK
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # 5. Install frontend dependencies
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      # 6. Build React/Vite app
      - name: Build web app
        working-directory: frontend
        run: npm run build
        env:
          VITE_APP_NAME: "Cyrix Field"
          VITE_APP_ENVIRONMENT: production
          VITE_FIREBASE_VAPID_KEY: ${{ secrets.VITE_FIREBASE_VAPID_KEY }}

      # 7. Add Android platform
      - name: Add Android platform
        working-directory: frontend
        run: |
          if [ ! -d "android" ]; then
            npx cap add android
          else
            echo "Android platform already exists, skipping add."
          fi

      # 8. Generate native icons & splash screens
      - name: Generate native icons and splash screens
        working-directory: frontend
        run: npx @capacitor/assets generate --android

      # 9. Write google-services.json (from GitHub Secret)
      - name: Write google-services.json
        run: |
          mkdir -p frontend/android/app
          echo '${{ secrets.GOOGLE_SERVICES_JSON }}' > frontend/android/app/google-services.json

      # 10. Sync Capacitor
      - name: Sync Capacitor to Android
        working-directory: frontend
        run: npx cap sync android

      # 10. Make gradlew executable
      - name: Make gradlew executable
        working-directory: frontend/android
        run: chmod +x gradlew

      # 11. Build Debug APK (no keystore needed for debug)
      - name: Build Debug APK
        working-directory: frontend/android
        run: ./gradlew assembleDebug --stacktrace

      # 12. Upload APK as downloadable artifact
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: FieldOps-Android-APK
          path: frontend/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      # 13. Show APK size
      - name: Show APK info
        run: |
          echo "✅ APK built successfully!"
          ls -lh frontend/android/app/build/outputs/apk/debug/app-debug.apk
