version: '3.8'

services:
  frontend:
    image: node:20-alpine
    container_name: fieldops_frontend
    working_dir: /app
    command: npm run dev
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - node_modules:/app/node_modules
    environment:
      VITE_API_BASE_URL: https://fieldops-secondary-api.sunilbishnoi.workers.dev/api
    restart: unless-stopped

volumes:
  node_modules:

networks:
  default:
    name: fieldops_network
