name: Keep Cloudflare Worker Active

on:
  schedule:
    # Runs every 10 minutes to keep worker databases warm
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping API Health Endpoint
        run: |
          curl -I -s https://fieldops-secondary-api.sunilbishnoi.workers.dev/api/health || echo "Ping failed!"
