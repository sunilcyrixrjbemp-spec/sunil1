name: Keep Render Awake

on:
  schedule:
    # Runs every 10 minutes to prevent Render's free tier from going to sleep
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping API Health Endpoint
        run: |
          curl -I -s https://expense-backend-zio8.onrender.com/api/health || echo "Ping failed, but server should be waking up/awake!"
